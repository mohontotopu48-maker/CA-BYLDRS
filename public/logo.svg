<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" xml:space="preserve">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00"/>
      <stop offset="100%" style="stop-color:#FF9F1C"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9F1C;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FF6B00;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Outer glow -->
  <circle cx="256" cy="256" r="248" fill="url(#glowGrad)"/>

  <!-- Main circle background -->
  <circle cx="256" cy="256" r="230" fill="url(#bgGrad)"/>

  <!-- Subtle inner ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- House icon (centered above CA) -->
  <g transform="translate(256, 180)" fill="white">
    <!-- Roof -->
    <polygon points="0,-55 -60,-5 60,-5" fill="white"/>
    <!-- Chimney -->
    <rect x="20" y="-50" width="14" height="30" fill="white" rx="2"/>
    <!-- House body -->
    <rect x="-45" y="-5" width="90" height="60" fill="white" rx="3"/>
    <!-- Door -->
    <rect x="-10" y="15" width="20" height="40" fill="#FF6B00" rx="2"/>
    <!-- Window left -->
    <rect x="-35" y="10" width="18" height="14" fill="#FF6B00" rx="2"/>
    <!-- Window right -->
    <rect x="17" y="10" width="18" height="14" fill="#FF6B00" rx="2"/>
  </g>

  <!-- "CA" text -->
  <text x="256" y="310" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="90" fill="white" letter-spacing="6">CA</text>

  <!-- "BYLDRS" text -->
  <text x="256" y="370" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="42" fill="white" letter-spacing="10">BYLDRS</text>

  <!-- Tagline -->
  <text x="256" y="400" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="14" fill="rgba(255,255,255,0.7)" letter-spacing="4">CONTRACTORS</text>
</svg>
